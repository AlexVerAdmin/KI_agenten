version: '3.8'

services:
  # Этот сервис работает только как воркер индексации и RAG на домашнем сервере
  local_worker:
    build: .
    container_name: antigravity_worker
    restart: always
    volumes:
      # NFS маунты из Nextcloud (замените /mnt/nfs/ на ваши реальные пути NFS)
      - /mnt/nfs/nextcloud/data/USER/files/Obsidian:/app/obsidian:ro
      - /mnt/nfs/nextcloud/data/USER/files/Documents/JobSearch:/app/job_search:ro
      # Хранилище для локальной векторной базы ChromaDB
      - ./local_chroma_db:/app/chroma_db
    environment:
      - OBSIDIAN_VAULT_PATH=/app/obsidian
      - JOB_SEARCH_PATH=/app/job_search
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - IS_WORKER_NODE=true
      - API_SECRET=your_secure_token_here # Для защиты связи VDS <-> Local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # На воркере UI не нужен, запускаем только API-обертку для RAG
    command: python -m core.worker_api

networks:
  default:
    name: antigravity_network
